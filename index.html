<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Photo Frame">
<title>Photo Frame</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #151515;
    --surface-hover: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e4df;
    --text-dim: #7a756e;
    --accent: #c9a87c;
    --accent-dim: rgba(201, 168, 124, 0.15);
    --danger: #c25f5f;
    --danger-dim: rgba(194, 95, 95, 0.15);
    --transition-speed: 1.5s;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body { overflow: hidden; }

  /* ── SLIDESHOW ── */
  #slideshow {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none;
    cursor: none;
    z-index: 50;
  }
  #slideshow.active { display: block; }

  .slide {
    position: absolute; inset: 0;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity var(--transition-speed) ease-in-out;
    will-change: opacity;
  }
  .slide.visible { opacity: 1; }
  .slide.ken-burns { background-size: cover; }
  .slide.kb-a { animation: kb-a 20s ease-in-out forwards; }
  .slide.kb-b { animation: kb-b 20s ease-in-out forwards; }
  .slide.kb-c { animation: kb-c 20s ease-in-out forwards; }

  @keyframes kb-a {
    0%   { transform: scale(1.0) translate(0, 0); }
    100% { transform: scale(1.1) translate(-1.5%, -1%); }
  }
  @keyframes kb-b {
    0%   { transform: scale(1.05) translate(1%, 0); }
    100% { transform: scale(1.0) translate(-0.5%, 1%); }
  }
  @keyframes kb-c {
    0%   { transform: scale(1.0) translate(0.5%, 0.5%); }
    100% { transform: scale(1.08) translate(0%, -1.5%); }
  }

  #slideshow-controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 40px 30px calc(30px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 10;
  }
  #slideshow.show-controls #slideshow-controls { opacity: 1; }

  .ss-btn {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
  }
  .ss-btn:active { background: rgba(255,255,255,0.25); }

  #photo-counter {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* ── SETUP ── */
  #setup {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #setup::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(201,168,124,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,124,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  .setup-header {
    flex-shrink: 0;
    padding: 24px 24px 0;
    position: relative;
    z-index: 2;
  }
  .setup-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 24px 30px;
    position: relative;
    z-index: 1;
  }
  .setup-inner {
    max-width: 520px;
    margin: 0 auto;
    width: 100%;
  }

  .logo {
    text-align: center;
    margin-bottom: 28px;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }
  .logo-icon {
    width: 44px; height: 44px;
    margin: 0 auto 14px;
    border: 1.5px solid var(--border);
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
  }
  .logo-icon svg { width: 20px; height: 20px; stroke: var(--accent); fill: none; stroke-width: 1.5; }
  .logo h1 { font-size: 20px; font-weight: 400; letter-spacing: -0.3px; }
  .logo p { font-size: 12px; color: var(--text-dim); margin-top: 4px; font-weight: 300; }

  /* upload buttons */
  .upload-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .upload-btn {
    flex: 1;
    padding: 14px 16px;
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .upload-btn:active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .upload-btn svg {
    display: block;
    margin: 0 auto 6px;
    width: 20px; height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
  }
  .upload-btn.hidden { display: none; }
  /* if folder btn is hidden, photo btn goes full width */
  .upload-row:has(.hidden) .upload-btn:not(.hidden) { flex: 1; }

  /* ── THUMBNAIL GRID ── */
  .thumb-section { margin-bottom: 20px; display: none; }
  .thumb-section.has-photos { display: block; }

  .thumb-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .thumb-count { font-size: 13px; color: var(--text-dim); font-weight: 300; }
  .thumb-count strong { color: var(--accent); font-weight: 500; }

  .thumb-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .thumb-act-btn {
    padding: 6px 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
  }
  .thumb-act-btn:active { background: var(--surface-hover); }
  .thumb-act-btn.danger {
    background: var(--danger-dim);
    border-color: rgba(194, 95, 95, 0.3);
    color: var(--danger);
  }
  .thumb-act-btn.danger:active { background: rgba(194, 95, 95, 0.3); }
  .thumb-act-btn.hidden { display: none; }

  .thumb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 6px;
    max-height: 280px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 12px;
    padding: 2px;
  }

  .thumb-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
    border: 2px solid var(--border);
    transition: border-color 0.15s, opacity 0.2s;
    cursor: pointer;
  }
  .thumb-item.selected { border-color: var(--accent); }

  .thumb-check {
    position: absolute;
    top: 4px; left: 4px;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    transition: all 0.15s;
    pointer-events: none;
  }
  .thumb-check svg {
    width: 12px; height: 12px;
    stroke: #fff; fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .thumb-item.selected .thumb-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .thumb-item.selected .thumb-check svg { opacity: 1; }

  .thumb-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .thumb-item img.loaded { opacity: 1; }

  /* settings */
  .settings { margin-bottom: 24px; }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 14px; font-weight: 400; }
  .setting-label small {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 300;
    margin-top: 2px;
  }

  .stepper {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .stepper button {
    width: 44px; height: 42px;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 300;
  }
  .stepper button:active { background: var(--surface-hover); }
  .stepper .stepper-val {
    min-width: 54px;
    text-align: center;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    line-height: 42px;
  }

  .toggle-wrap {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .toggle-opt {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .toggle-opt.active { background: var(--accent-dim); color: var(--accent); }
  .toggle-opt + .toggle-opt { border-left: 1px solid var(--border); }

  .start-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--accent);
    color: var(--bg);
  }
  .start-btn:disabled {
    background: var(--surface);
    color: var(--text-dim);
    cursor: not-allowed;
    border: 1px solid var(--border);
  }
  .start-btn:not(:disabled):active { transform: scale(0.98); filter: brightness(0.9); }

  /* progress */
  .progress-wrap {
    position: fixed; top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.05);
    z-index: 100;
    display: none;
  }
  .progress-wrap.active { display: block; }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.15s ease-out;
  }
  .progress-text {
    position: fixed;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 300;
    z-index: 101;
    display: none;
    background: var(--surface);
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .progress-wrap.active ~ .progress-text { display: block; }

  /* error toast */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--danger);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 400;
    z-index: 200;
    transition: transform 0.3s ease-out;
    max-width: 90vw;
    text-align: center;
  }
  .toast.visible { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="progress-text" id="progressText"></div>
<div class="toast" id="toast"></div>

<div id="setup">
  <div class="setup-header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </div>
      <h1>Photo Frame</h1>
      <p>No accounts. No subscriptions. Just your photos.</p>
    </div>
  </div>

  <div class="setup-scroll">
    <div class="setup-inner">

      <div class="upload-row">
        <button class="upload-btn" id="pickFilesBtn">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Select Photos
        </button>
        <button class="upload-btn" id="pickFolderBtn">
          <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          Select Folder
        </button>
      </div>

      <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
      <input type="file" id="folderInput" webkitdirectory multiple style="display:none">

      <div class="thumb-section" id="thumbSection">
        <div class="thumb-header">
          <span class="thumb-count"><strong id="thumbCount">0</strong> photos</span>
          <div class="thumb-actions">
            <button class="thumb-act-btn" id="selectAllBtn">Select All</button>
            <button class="thumb-act-btn hidden" id="deselectAllBtn">Deselect</button>
            <button class="thumb-act-btn danger hidden" id="removeSelectedBtn">Remove Selected</button>
            <button class="thumb-act-btn danger" id="clearAllBtn">Clear All</button>
          </div>
        </div>
        <div class="thumb-grid" id="thumbGrid"></div>
      </div>

      <div class="settings">
        <div class="setting-row">
          <div class="setting-label">
            Interval
            <small>seconds per photo</small>
          </div>
          <div class="stepper">
            <button id="intervalDown">−</button>
            <div class="stepper-val" id="intervalVal">10s</div>
            <button id="intervalUp">+</button>
          </div>
        </div>
        <div class="setting-row">
          <div class="setting-label">Transition</div>
          <div class="toggle-wrap">
            <button class="toggle-opt active" data-transition="fade">Fade</button>
            <button class="toggle-opt" data-transition="kenburns">Ken Burns</button>
          </div>
        </div>
        <div class="setting-row">
          <div class="setting-label">Order</div>
          <div class="toggle-wrap">
            <button class="toggle-opt active" data-order="shuffle">Shuffle</button>
            <button class="toggle-opt" data-order="sequential">In Order</button>
          </div>
        </div>
        <div class="setting-row">
          <div class="setting-label">
            Fit
            <small>contain = full photo</small>
          </div>
          <div class="toggle-wrap">
            <button class="toggle-opt active" data-fit="contain">Contain</button>
            <button class="toggle-opt" data-fit="cover">Fill</button>
          </div>
        </div>
      </div>

      <button class="start-btn" id="startBtn" disabled>Start Slideshow</button>
    </div>
  </div>
</div>

<div id="slideshow">
  <div class="slide" id="slideA"></div>
  <div class="slide" id="slideB"></div>
  <div id="slideshow-controls">
    <button class="ss-btn" id="exitBtn">✕ Exit</button>
    <span id="photo-counter"></span>
    <button class="ss-btn" id="pauseBtn">❚❚ Pause</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── Config ──
  const MAX_DIM = 1920;       // slideshow image longest edge
  const THUMB_DIM = 150;      // thumbnail longest edge
  const JPEG_Q = 0.82;        // slideshow quality
  const THUMB_Q = 0.6;        // thumbnail quality
  const DB_NAME = 'PhotoFrameDB_v2';  // new DB name — clean break from old bugged versions
  const DB_VER = 1;            // fresh version 1 since new DB name
  const P_STORE = 'photos';
  const T_STORE = 'thumbs';

  // ── Image file extensions for MIME fallback ──
  const IMG_EXTS = new Set([
    'jpg','jpeg','png','gif','webp','bmp','tiff','tif',
    'heic','heif','avif','svg','ico'
  ]);

  // ── State ──
  let photoIds = [];
  let interval = 10;
  let transition = 'fade';
  let order = 'shuffle';
  let fit = 'contain';
  let currentIndex = 0;
  let shuffledOrder = [];
  let playing = false;
  let timer = null;
  let controlsTimer = null;
  let useSlideA = true;
  let kbVariant = 0;
  let currentBlobUrl = null;
  let preloadedBlobUrl = null;
  let preloadedIndex = -1;
  let thumbBlobUrls = [];
  let selectedIds = new Set();
  let importing = false;       // guard against concurrent imports

  // ── Toast ──
  let toastTimer = null;
  function showToast(msg, duration) {
    duration = duration || 4000;
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('visible'), duration);
  }

  // ── DB with proper upgrade + blocked handling ──
  function openDB() {
    return new Promise((resolve, reject) => {
      let blocked = false;
      const req = indexedDB.open(DB_NAME, DB_VER);

      req.onblocked = () => {
        // another tab/instance has the DB open at an old version
        blocked = true;
        reject(new Error('DB blocked — close other tabs with this site and retry'));
      };

      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(P_STORE)) {
          db.createObjectStore(P_STORE, { keyPath: 'id', autoIncrement: true });
        }
        if (!db.objectStoreNames.contains(T_STORE)) {
          db.createObjectStore(T_STORE, { keyPath: 'id' });
        }
      };

      req.onsuccess = (e) => {
        if (blocked) return;  // already rejected
        const db = e.target.result;
        // if another tab upgrades the DB, close our connection so it can proceed
        db.onversionchange = () => { db.close(); };
        resolve(db);
      };

      req.onerror = (e) => {
        if (blocked) return;
        reject(e.target.error || new Error('DB open failed'));
      };

      // timeout safety: if DB open hangs for >5s, reject
      setTimeout(() => {
        if (!blocked) {
          // check if still pending by testing if req.readyState === 'done'
          // if not done, we're stuck
        }
      }, 5000);
    });
  }

  // ── DB Operations ──
  // save photo + thumbnail sequentially in one transaction
  function dbSave(db, photoBlob, thumbBlob) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction([P_STORE, T_STORE], 'readwrite');
      const pStore = tx.objectStore(P_STORE);
      const tStore = tx.objectStore(T_STORE);

      const addReq = pStore.add({ blob: photoBlob });
      addReq.onsuccess = () => {
        // now save thumb with same ID
        tStore.put({ id: addReq.result, blob: thumbBlob });
      };
      addReq.onerror = () => reject(addReq.error);

      tx.oncomplete = () => resolve(addReq.result);
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error || new Error('Transaction aborted'));
    });
  }

  function dbGetKeys(db) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(P_STORE, 'readonly');
      const req = tx.objectStore(P_STORE).getAllKeys();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function dbGetPhoto(db, id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(P_STORE, 'readonly');
      const req = tx.objectStore(P_STORE).get(id);
      req.onsuccess = () => resolve(req.result ? req.result.blob : null);
      req.onerror = () => reject(req.error);
    });
  }

  function dbGetThumb(db, id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(T_STORE, 'readonly');
      const req = tx.objectStore(T_STORE).get(id);
      req.onsuccess = () => resolve(req.result ? req.result.blob : null);
      req.onerror = () => reject(req.error);
    });
  }

  function dbDelete(db, id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction([P_STORE, T_STORE], 'readwrite');
      tx.objectStore(P_STORE).delete(id);
      tx.objectStore(T_STORE).delete(id);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  }

  function dbClearAll(db) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction([P_STORE, T_STORE], 'readwrite');
      tx.objectStore(P_STORE).clear();
      tx.objectStore(T_STORE).clear();
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  }

  // ── Image Processing ──
  // decode once, produce both sizes sequentially to avoid OOM on old iPads
  function decodeImage(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        resolve(img);
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error('Image decode failed: ' + (file.name || 'unknown')));
      };
      img.src = url;
    });
  }

  function canvasToBlob(canvas, quality) {
    return new Promise((resolve, reject) => {
      // try toBlob first, fall back to toDataURL
      if (canvas.toBlob) {
        canvas.toBlob(
          (blob) => blob ? resolve(blob) : reject(new Error('toBlob returned null')),
          'image/jpeg',
          quality
        );
      } else {
        // fallback for very old browsers
        try {
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          const parts = dataUrl.split(',');
          const bin = atob(parts[1]);
          const arr = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
          resolve(new Blob([arr], { type: 'image/jpeg' }));
        } catch(e) {
          reject(e);
        }
      }
    });
  }

  function renderToCanvas(img, maxDim) {
    const w = img.naturalWidth || img.width;
    const h = img.naturalHeight || img.height;
    const longest = Math.max(w, h);
    const scale = longest > maxDim ? maxDim / longest : 1;
    const nw = Math.round(w * scale);
    const nh = Math.round(h * scale);

    const canvas = document.createElement('canvas');
    canvas.width = nw;
    canvas.height = nh;
    canvas.getContext('2d').drawImage(img, 0, 0, nw, nh);
    return canvas;
  }

  // process one file: decode once, render two sizes sequentially
  async function processFile(file) {
    const img = await decodeImage(file);

    // render full size first
    const photoCanvas = renderToCanvas(img, MAX_DIM);
    const photoBlob = await canvasToBlob(photoCanvas, JPEG_Q);

    // then thumbnail (reuses the already-decoded img — no second network/decode hit)
    const thumbCanvas = renderToCanvas(img, THUMB_DIM);
    const thumbBlob = await canvasToBlob(thumbCanvas, THUMB_Q);

    return { photo: photoBlob, thumb: thumbBlob };
  }

  // ── File Filtering ──
  // check if a file is an image by MIME type, falling back to extension
  function isImageFile(f) {
    if (f.type && f.type.startsWith('image/')) return true;
    // MIME type missing (common with webkitdirectory on some browsers)
    const name = (f.name || '').toLowerCase();
    const dot = name.lastIndexOf('.');
    if (dot === -1) return false;
    return IMG_EXTS.has(name.slice(dot + 1));
  }

  // ── Elements ──
  const el = {
    setup: document.getElementById('setup'),
    slideshow: document.getElementById('slideshow'),
    fileInput: document.getElementById('fileInput'),
    folderInput: document.getElementById('folderInput'),
    thumbSection: document.getElementById('thumbSection'),
    thumbCount: document.getElementById('thumbCount'),
    thumbGrid: document.getElementById('thumbGrid'),
    intervalVal: document.getElementById('intervalVal'),
    startBtn: document.getElementById('startBtn'),
    exitBtn: document.getElementById('exitBtn'),
    pauseBtn: document.getElementById('pauseBtn'),
    counter: document.getElementById('photo-counter'),
    slideA: document.getElementById('slideA'),
    slideB: document.getElementById('slideB'),
    progressWrap: document.getElementById('progressWrap'),
    progressBar: document.getElementById('progressBar'),
    progressText: document.getElementById('progressText'),
    selectAllBtn: document.getElementById('selectAllBtn'),
    deselectAllBtn: document.getElementById('deselectAllBtn'),
    removeSelectedBtn: document.getElementById('removeSelectedBtn'),
    clearAllBtn: document.getElementById('clearAllBtn'),
    pickFolderBtn: document.getElementById('pickFolderBtn'),
  };

  // ── Feature detection: hide folder picker on iOS ──
  (function detectFeatures() {
    // webkitdirectory is not supported on iOS/iPadOS Safari
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if (isIOS) {
      el.pickFolderBtn.classList.add('hidden');
    }
  })();

  // ── Thumbnail Grid ──
  let thumbObserver = null;

  function revokeThumbUrls() {
    for (const u of thumbBlobUrls) {
      try { URL.revokeObjectURL(u); } catch(e) {}
    }
    thumbBlobUrls = [];
  }

  async function buildThumbGrid() {
    revokeThumbUrls();
    el.thumbGrid.innerHTML = '';
    selectedIds.clear();
    updateSelectionUI();

    const has = photoIds.length > 0;
    el.thumbSection.classList.toggle('has-photos', has);
    el.thumbCount.textContent = photoIds.length;
    el.startBtn.disabled = !has;
    if (!has) return;

    if (thumbObserver) thumbObserver.disconnect();

    // build DOM
    const frag = document.createDocumentFragment();
    for (const id of photoIds) {
      const item = document.createElement('div');
      item.className = 'thumb-item';
      item.dataset.pid = id;

      const check = document.createElement('div');
      check.className = 'thumb-check';
      check.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';

      const img = document.createElement('img');
      img.alt = '';
      img.dataset.pid = String(id);

      item.appendChild(check);
      item.appendChild(img);
      frag.appendChild(item);
    }
    el.thumbGrid.appendChild(frag);

    // lazy-load thumbnails via IntersectionObserver
    let thumbDb;
    try {
      thumbDb = await openDB();
    } catch(e) {
      showToast('Could not open database for thumbnails');
      return;
    }

    thumbObserver = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (!entry.isIntersecting) continue;
        const img = entry.target;
        const id = parseInt(img.dataset.pid, 10);
        thumbObserver.unobserve(img);

        // async load — fire and forget per thumbnail
        (async () => {
          try {
            const blob = await dbGetThumb(thumbDb, id);
            if (blob) {
              const url = URL.createObjectURL(blob);
              thumbBlobUrls.push(url);
              img.src = url;
              img.onload = () => img.classList.add('loaded');
            }
          } catch(e) {
            // thumbnail missing — could be orphaned data, skip silently
          }
        })();
      }
    }, { root: el.thumbGrid, rootMargin: '200px' });

    for (const img of el.thumbGrid.querySelectorAll('img')) {
      thumbObserver.observe(img);
    }
  }

  // ── Selection UI ──
  function updateSelectionUI() {
    const count = selectedIds.size;
    const has = count > 0;
    const all = count === photoIds.length && count > 0;

    el.selectAllBtn.classList.toggle('hidden', all);
    el.deselectAllBtn.classList.toggle('hidden', !has);
    el.removeSelectedBtn.classList.toggle('hidden', !has);
    el.removeSelectedBtn.textContent = has ? `Remove ${count}` : 'Remove';
  }

  // tap to toggle selection
  el.thumbGrid.addEventListener('click', (e) => {
    const item = e.target.closest('.thumb-item');
    if (!item) return;
    const id = parseInt(item.dataset.pid, 10);
    if (selectedIds.has(id)) {
      selectedIds.delete(id);
      item.classList.remove('selected');
    } else {
      selectedIds.add(id);
      item.classList.add('selected');
    }
    updateSelectionUI();
  });

  el.selectAllBtn.addEventListener('click', () => {
    for (const id of photoIds) selectedIds.add(id);
    for (const item of el.thumbGrid.querySelectorAll('.thumb-item')) item.classList.add('selected');
    updateSelectionUI();
  });

  el.deselectAllBtn.addEventListener('click', () => {
    selectedIds.clear();
    for (const item of el.thumbGrid.querySelectorAll('.thumb-item')) item.classList.remove('selected');
    updateSelectionUI();
  });

  el.removeSelectedBtn.addEventListener('click', async () => {
    const count = selectedIds.size;
    if (!count) return;
    if (!confirm('Remove ' + count + ' selected photo' + (count > 1 ? 's' : '') + '?')) return;

    // fade out selected
    for (const item of el.thumbGrid.querySelectorAll('.thumb-item.selected')) {
      item.style.opacity = '0.2';
      item.style.pointerEvents = 'none';
    }

    try {
      const db = await openDB();
      for (const id of selectedIds) {
        await dbDelete(db, id);
      }
      photoIds = photoIds.filter(k => !selectedIds.has(k));
      selectedIds.clear();
    } catch(e) {
      showToast('Failed to remove some photos');
    }
    buildThumbGrid();
  });

  el.clearAllBtn.addEventListener('click', async () => {
    if (!photoIds.length) return;
    if (!confirm('Remove all ' + photoIds.length + ' photos?')) return;
    try {
      const db = await openDB();
      await dbClearAll(db);
    } catch(e) {
      showToast('Failed to clear photos');
    }
    photoIds = [];
    selectedIds.clear();
    revokeThumbUrls();
    buildThumbGrid();
  });

  // ── Import Pipeline ──
  async function handleFiles(fileList) {
    if (importing) {
      showToast('Import already in progress');
      return;
    }

    const files = Array.from(fileList).filter(isImageFile);
    if (!files.length) {
      showToast('No image files found in selection');
      return;
    }

    importing = true;
    const total = files.length;
    let done = 0;
    let fail = 0;

    el.progressWrap.classList.add('active');
    el.progressBar.style.width = '0%';
    el.progressText.textContent = '0 / ' + total;

    let db;
    try {
      db = await openDB();
    } catch(e) {
      showToast('Database error: ' + e.message);
      el.progressWrap.classList.remove('active');
      el.progressText.textContent = '';
      importing = false;
      return;
    }

    // process ONE AT A TIME to avoid OOM on old iPads
    // this is slower but dramatically more reliable
    for (let i = 0; i < total; i++) {
      try {
        const { photo, thumb } = await processFile(files[i]);
        await dbSave(db, photo, thumb);
      } catch(e) {
        fail++;
        console.warn('Skipped:', files[i].name, e.message);
      }

      done++;
      el.progressBar.style.width = Math.round((done / total) * 100) + '%';
      el.progressText.textContent = done + ' / ' + total;

      // yield to UI every 3 files so progress bar actually updates
      if (done % 3 === 0) {
        await new Promise(r => setTimeout(r, 0));
      }
    }

    // refresh keys
    try {
      photoIds = await dbGetKeys(db);
    } catch(e) {
      showToast('Failed to refresh photo list');
    }

    setTimeout(() => {
      el.progressWrap.classList.remove('active');
      el.progressBar.style.width = '0%';
      el.progressText.textContent = '';
    }, 600);

    if (fail > 0) {
      showToast(fail + ' file' + (fail > 1 ? 's' : '') + ' could not be imported');
    }

    importing = false;
    buildThumbGrid();
  }

  // ── Upload Events ──
  document.getElementById('pickFilesBtn').addEventListener('click', () => {
    if (importing) return;
    el.fileInput.click();
  });
  el.pickFolderBtn.addEventListener('click', () => {
    if (importing) return;
    el.folderInput.click();
  });

  el.fileInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files.length) handleFiles(e.target.files);
    e.target.value = '';
  });
  el.folderInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files.length) handleFiles(e.target.files);
    e.target.value = '';
  });

  // ── Settings ──
  document.getElementById('intervalDown').addEventListener('click', () => {
    if (interval <= 5) interval = Math.max(3, interval - 1);
    else if (interval <= 15) interval -= 5;
    else interval = Math.max(15, interval - 15);
    el.intervalVal.textContent = interval + 's';
  });
  document.getElementById('intervalUp').addEventListener('click', () => {
    if (interval < 5) interval++;
    else if (interval < 15) interval += 5;
    else interval = Math.min(120, interval + 15);
    el.intervalVal.textContent = interval + 's';
  });
  el.intervalVal.textContent = interval + 's';

  document.querySelectorAll('[data-transition]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('[data-transition]').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      transition = btn.dataset.transition;
    });
  });
  document.querySelectorAll('[data-order]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('[data-order]').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      order = btn.dataset.order;
    });
  });
  document.querySelectorAll('[data-fit]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('[data-fit]').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      fit = btn.dataset.fit;
    });
  });

  // ── Slideshow Engine ──
  let ssDb = null;

  function buildOrder() {
    shuffledOrder = Array.from({ length: photoIds.length }, function(_, i) { return i; });
    if (order === 'shuffle') {
      for (let i = shuffledOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = shuffledOrder[i];
        shuffledOrder[i] = shuffledOrder[j];
        shuffledOrder[j] = tmp;
      }
    }
  }

  function revokeUrl(u) {
    if (u) try { URL.revokeObjectURL(u); } catch(e) {}
  }

  async function loadPhotoUrl(idx) {
    const key = photoIds[shuffledOrder[idx]];
    if (key === undefined) return null;
    const blob = await dbGetPhoto(ssDb, key);
    return blob ? URL.createObjectURL(blob) : null;
  }

  async function showPhoto() {
    let url;
    if (preloadedIndex === currentIndex && preloadedBlobUrl) {
      url = preloadedBlobUrl;
      preloadedBlobUrl = null;
      preloadedIndex = -1;
    } else {
      url = await loadPhotoUrl(currentIndex);
    }
    if (!url) return;

    const incoming = useSlideA ? el.slideA : el.slideB;
    const outgoing = useSlideA ? el.slideB : el.slideA;

    incoming.style.backgroundImage = 'url(' + url + ')';
    incoming.style.backgroundSize = (transition === 'kenburns' || fit === 'cover') ? 'cover' : 'contain';

    incoming.classList.remove('ken-burns', 'kb-a', 'kb-b', 'kb-c');
    if (transition === 'kenburns') {
      const variants = ['kb-a', 'kb-b', 'kb-c'];
      incoming.classList.add('ken-burns', variants[kbVariant % 3]);
      kbVariant++;
    }

    incoming.classList.add('visible');
    outgoing.classList.remove('visible');

    const oldUrl = currentBlobUrl;
    setTimeout(function() { revokeUrl(oldUrl); }, 2500);
    currentBlobUrl = url;
    useSlideA = !useSlideA;
    el.counter.textContent = (currentIndex + 1) + ' / ' + photoIds.length;
    preloadNext();
  }

  async function preloadNext() {
    const ni = (currentIndex + 1) % photoIds.length;
    if (preloadedIndex === ni && preloadedBlobUrl) return;
    revokeUrl(preloadedBlobUrl);
    preloadedBlobUrl = null;
    try {
      preloadedBlobUrl = await loadPhotoUrl(ni);
      preloadedIndex = ni;
    } catch(e) {}
  }

  async function advance() {
    currentIndex = (currentIndex + 1) % photoIds.length;
    if (currentIndex === 0 && order === 'shuffle') buildOrder();
    await showPhoto();
  }

  async function startSlideshow() {
    try {
      ssDb = await openDB();
      photoIds = await dbGetKeys(ssDb);
    } catch(e) {
      showToast('Could not start slideshow: ' + e.message);
      return;
    }
    if (!photoIds.length) {
      showToast('No photos to show');
      return;
    }

    // free thumbnail memory
    revokeThumbUrls();
    if (thumbObserver) thumbObserver.disconnect();

    buildOrder();
    currentIndex = 0;
    kbVariant = 0;

    el.slideA.classList.remove('visible', 'ken-burns', 'kb-a', 'kb-b', 'kb-c');
    el.slideB.classList.remove('visible', 'ken-burns', 'kb-a', 'kb-b', 'kb-c');
    el.slideA.style.backgroundImage = '';
    el.slideB.style.backgroundImage = '';

    el.setup.style.display = 'none';
    el.slideshow.classList.add('active');
    playing = true;

    document.documentElement.style.setProperty(
      '--transition-speed',
      Math.min(interval * 0.3, 2) + 's'
    );

    await showPhoto();
    timer = setInterval(function() { advance(); }, interval * 1000);
    flashControls();
  }

  function stopSlideshow() {
    playing = false;
    clearInterval(timer);
    timer = null;
    revokeUrl(currentBlobUrl);
    revokeUrl(preloadedBlobUrl);
    currentBlobUrl = null;
    preloadedBlobUrl = null;
    preloadedIndex = -1;
    el.slideA.style.backgroundImage = '';
    el.slideB.style.backgroundImage = '';
    el.slideshow.classList.remove('active', 'show-controls');
    el.setup.style.display = 'flex';
    buildThumbGrid();
  }

  function flashControls() {
    el.slideshow.classList.add('show-controls');
    clearTimeout(controlsTimer);
    controlsTimer = setTimeout(function() {
      el.slideshow.classList.remove('show-controls');
    }, 3500);
  }

  el.startBtn.addEventListener('click', startSlideshow);
  el.exitBtn.addEventListener('click', stopSlideshow);
  el.pauseBtn.addEventListener('click', function() {
    if (playing) {
      clearInterval(timer);
      timer = null;
      playing = false;
      el.pauseBtn.textContent = '▶ Play';
    } else {
      playing = true;
      timer = setInterval(function() { advance(); }, interval * 1000);
      el.pauseBtn.textContent = '❚❚ Pause';
    }
    flashControls();
  });
  el.slideshow.addEventListener('click', function(e) {
    if (e.target.closest('#slideshow-controls')) return;
    flashControls();
  });

  // ── Init ──
  (async function init() {
    try {
      const db = await openDB();
      photoIds = await dbGetKeys(db);
      buildThumbGrid();
    } catch(e) {
      console.warn('Init failed:', e.message);
      showToast('Database error — try clearing site data and reloading');
    }
  })();

})();
</script>
</body>
</html>
