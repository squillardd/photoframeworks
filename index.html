<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Photo Frame">
<title>Photo Frame</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #151515;
    --surface-hover: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e4df;
    --text-dim: #7a756e;
    --accent: #c9a87c;
    --accent-dim: rgba(201, 168, 124, 0.15);
    --transition-speed: 1.5s;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── SLIDESHOW ── */
  #slideshow {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none;
    cursor: none;
  }

  #slideshow.active { display: block; }

  .slide {
    position: absolute; inset: 0;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity var(--transition-speed) ease-in-out;
    will-change: opacity;
  }

  .slide.visible { opacity: 1; }

  .slide.ken-burns {
    background-size: cover;
  }

  .slide.kb-a { animation: kenburns-a 20s ease-in-out forwards; }
  .slide.kb-b { animation: kenburns-b 20s ease-in-out forwards; }
  .slide.kb-c { animation: kenburns-c 20s ease-in-out forwards; }

  @keyframes kenburns-a {
    0%   { transform: scale(1.0) translate(0, 0); }
    100% { transform: scale(1.1) translate(-1.5%, -1%); }
  }
  @keyframes kenburns-b {
    0%   { transform: scale(1.05) translate(1%, 0); }
    100% { transform: scale(1.0) translate(-0.5%, 1%); }
  }
  @keyframes kenburns-c {
    0%   { transform: scale(1.0) translate(0.5%, 0.5%); }
    100% { transform: scale(1.08) translate(0%, -1.5%); }
  }

  #slideshow-controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 40px 30px calc(30px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 10;
  }

  #slideshow.show-controls #slideshow-controls { opacity: 1; }

  .ss-btn {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.2s;
  }

  .ss-btn:active { background: rgba(255,255,255,0.25); }

  #photo-counter {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* ── SETUP SCREEN ── */
  #setup {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
    position: relative;
    overflow-y: auto;
  }

  #setup::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(201,168,124,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,124,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  .setup-card {
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
  }

  .logo {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo-icon {
    width: 48px; height: 48px;
    margin: 0 auto 18px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
  }

  .logo-icon svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.5; }

  .logo h1 {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo p {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
    font-weight: 300;
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 16px;
    padding: 44px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.3s, background 0.3s;
    background: transparent;
    margin-bottom: 10px;
  }

  .upload-zone:active,
  .upload-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .upload-zone.has-photos {
    border-style: solid;
    border-color: var(--accent);
    background: var(--accent-dim);
    padding: 28px 24px;
  }

  .upload-icon {
    width: 40px; height: 40px;
    margin: 0 auto 14px;
    opacity: 0.4;
  }

  .upload-icon svg { width: 100%; height: 100%; stroke: var(--text); fill: none; stroke-width: 1.2; }

  .upload-zone p {
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 300;
  }

  .upload-zone .photo-count {
    font-size: 28px;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .upload-zone .photo-label {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 300;
  }

  .upload-zone .tap-hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 14px;
    opacity: 0.6;
  }

  /* Upload buttons row */
  .upload-row {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .upload-btn {
    flex: 1;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .upload-btn:active {
    background: var(--surface-hover);
    border-color: var(--accent);
    color: var(--text);
  }

  .upload-btn svg {
    display: block;
    margin: 0 auto 6px;
    width: 20px; height: 20px;
    stroke: var(--text-dim);
    fill: none;
    stroke-width: 1.5;
  }

  /* Settings */
  .settings { margin-bottom: 32px; }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .setting-row:last-child { border-bottom: none; }

  .setting-label {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
  }

  .setting-label small {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 300;
    margin-top: 3px;
  }

  /* Stepper */
  .stepper {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .stepper button {
    width: 44px; height: 42px;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 300;
    transition: background 0.15s;
  }

  .stepper button:active { background: var(--surface-hover); }

  .stepper .stepper-val {
    min-width: 54px;
    text-align: center;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 0 4px;
    line-height: 42px;
  }

  /* Toggle */
  .toggle-wrap {
    display: flex; gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .toggle-opt {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }

  .toggle-opt.active {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .toggle-opt + .toggle-opt { border-left: 1px solid var(--border); }

  /* Start button */
  .start-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--accent);
    color: var(--bg);
  }

  .start-btn:disabled {
    background: var(--surface);
    color: var(--text-dim);
    cursor: not-allowed;
    border: 1px solid var(--border);
  }

  .start-btn:not(:disabled):active {
    transform: scale(0.98);
    filter: brightness(0.9);
  }

  .clear-link {
    display: block;
    text-align: center;
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    opacity: 0.6;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }

  /* Progress bar */
  .progress-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.05);
    z-index: 100;
    display: none;
  }

  .progress-wrap.active { display: block; }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.15s ease-out;
  }

  .progress-text {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 300;
    z-index: 101;
    display: none;
    background: var(--surface);
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .progress-wrap.active + .progress-text { display: block; }
</style>
</head>
<body>

<div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="progress-text" id="progressText"></div>

<!-- SETUP SCREEN -->
<div id="setup">
  <div class="setup-card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </div>
      <h1>Photo Frame</h1>
      <p>No accounts. No subscriptions. Just your photos.</p>
    </div>

    <div class="upload-zone" id="uploadZone">
      <div id="uploadEmpty">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        </div>
        <p>Tap below to add photos</p>
      </div>
      <div id="uploadLoaded" style="display:none">
        <div class="photo-count" id="photoCount">0</div>
        <div class="photo-label">photos loaded</div>
        <div class="tap-hint">add more below</div>
      </div>
    </div>

    <div class="upload-row">
      <button class="upload-btn" id="pickFilesBtn">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Select Photos
      </button>
      <button class="upload-btn" id="pickFolderBtn">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        Select Folder
      </button>
    </div>

    <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
    <input type="file" id="folderInput" webkitdirectory multiple accept="image/*" style="display:none">

    <div class="settings">
      <div class="setting-row">
        <div class="setting-label">
          Interval
          <small>seconds per photo</small>
        </div>
        <div class="stepper">
          <button id="intervalDown">−</button>
          <div class="stepper-val" id="intervalVal">10</div>
          <button id="intervalUp">+</button>
        </div>
      </div>

      <div class="setting-row">
        <div class="setting-label">
          Transition
        </div>
        <div class="toggle-wrap">
          <button class="toggle-opt active" data-transition="fade">Fade</button>
          <button class="toggle-opt" data-transition="kenburns">Ken Burns</button>
        </div>
      </div>

      <div class="setting-row">
        <div class="setting-label">
          Order
        </div>
        <div class="toggle-wrap">
          <button class="toggle-opt active" data-order="shuffle">Shuffle</button>
          <button class="toggle-opt" data-order="sequential">In Order</button>
        </div>
      </div>

      <div class="setting-row">
        <div class="setting-label">
          Fit
          <small>contain = full photo, fill = cropped</small>
        </div>
        <div class="toggle-wrap">
          <button class="toggle-opt active" data-fit="contain">Contain</button>
          <button class="toggle-opt" data-fit="cover">Fill</button>
        </div>
      </div>
    </div>

    <button class="start-btn" id="startBtn" disabled>Start Slideshow</button>
    <button class="clear-link" id="clearBtn" style="display:none">Clear all photos &amp; start over</button>
  </div>
</div>

<!-- SLIDESHOW -->
<div id="slideshow">
  <div class="slide" id="slideA"></div>
  <div class="slide" id="slideB"></div>
  <div id="slideshow-controls">
    <button class="ss-btn" id="exitBtn">✕ Exit</button>
    <span id="photo-counter"></span>
    <button class="ss-btn" id="pauseBtn">❚❚ Pause</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── Config ──
  const MAX_DIMENSION = 1920;  // downscale longest edge to this
  const JPEG_QUALITY = 0.82;   // quality for resized images
  const DB_NAME = 'PhotoFrameDB';
  const DB_VERSION = 2;
  const STORE = 'photos';
  const META_STORE = 'meta';
  const BATCH_SIZE = 5;        // process N images at a time during import

  // ── State ──
  let photoCount = 0;          // total count in DB — we do NOT hold blobs in RAM
  let interval = 10;
  let transition = 'fade';
  let order = 'shuffle';
  let fit = 'contain';
  let currentIndex = 0;
  let shuffledOrder = [];
  let photoIds = [];            // array of DB keys — lightweight
  let playing = false;
  let timer = null;
  let controlsTimer = null;
  let useSlideA = true;
  let kbVariant = 0;

  // active blob URLs — only ever 2 max (current + preloaded next)
  let currentBlobUrl = null;
  let preloadedBlobUrl = null;
  let preloadedIndex = -1;

  // ── DB ──
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE)) {
          db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        }
        if (!db.objectStoreNames.contains(META_STORE)) {
          db.createObjectStore(META_STORE, { keyPath: 'key' });
        }
      };
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = e => reject(e.target.error);
    });
  }

  // save one resized blob, returns its id
  async function savePhoto(db, blob) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).add({ blob });
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  // get all keys (not values — cheap)
  async function getAllKeys(db) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAllKeys();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  // get one photo blob by id
  async function getPhoto(db, id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(id);
      req.onsuccess = () => resolve(req.result ? req.result.blob : null);
      req.onerror = () => reject(req.error);
    });
  }

  async function clearAllPhotos(db) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).clear();
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  }

  // ── Image Resizer ──
  // downscale to MAX_DIMENSION, output as JPEG blob
  function resizeImage(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);

      img.onload = () => {
        URL.revokeObjectURL(url);

        let { width, height } = img;
        const longest = Math.max(width, height);

        // skip resize if already small enough
        if (longest <= MAX_DIMENSION) {
          // still convert to JPEG for consistency & smaller size
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          canvas.toBlob(blob => {
            if (blob) resolve(blob);
            else reject(new Error('Canvas toBlob failed'));
          }, 'image/jpeg', JPEG_QUALITY);
          return;
        }

        const scale = MAX_DIMENSION / longest;
        const newW = Math.round(width * scale);
        const newH = Math.round(height * scale);

        const canvas = document.createElement('canvas');
        canvas.width = newW;
        canvas.height = newH;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, newW, newH);
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error('Canvas toBlob failed'));
        }, 'image/jpeg', JPEG_QUALITY);
      };

      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error('Image load failed'));
      };

      img.src = url;
    });
  }

  // ── Elements ──
  const el = {
    setup: document.getElementById('setup'),
    slideshow: document.getElementById('slideshow'),
    uploadZone: document.getElementById('uploadZone'),
    uploadEmpty: document.getElementById('uploadEmpty'),
    uploadLoaded: document.getElementById('uploadLoaded'),
    fileInput: document.getElementById('fileInput'),
    folderInput: document.getElementById('folderInput'),
    photoCount: document.getElementById('photoCount'),
    intervalVal: document.getElementById('intervalVal'),
    startBtn: document.getElementById('startBtn'),
    clearBtn: document.getElementById('clearBtn'),
    exitBtn: document.getElementById('exitBtn'),
    pauseBtn: document.getElementById('pauseBtn'),
    counter: document.getElementById('photo-counter'),
    slideA: document.getElementById('slideA'),
    slideB: document.getElementById('slideB'),
    progressWrap: document.getElementById('progressWrap'),
    progressBar: document.getElementById('progressBar'),
    progressText: document.getElementById('progressText'),
  };

  // ── UI Update ──
  function updateUI() {
    const has = photoCount > 0;
    el.uploadEmpty.style.display = has ? 'none' : 'block';
    el.uploadLoaded.style.display = has ? 'block' : 'none';
    el.photoCount.textContent = photoCount;
    el.startBtn.disabled = !has;
    el.clearBtn.style.display = has ? 'block' : 'none';
    if (has) el.uploadZone.classList.add('has-photos');
    else el.uploadZone.classList.remove('has-photos');
  }

  // ── Import Pipeline ──
  // process files in batches: resize → store in DB → update progress
  async function handleFiles(fileList) {
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if (!files.length) return;

    const total = files.length;
    let processed = 0;
    let failed = 0;

    el.progressWrap.classList.add('active');
    el.progressBar.style.width = '0%';
    el.progressText.textContent = `Processing 0 / ${total}`;

    const db = await openDB();

    // process in batches to avoid overwhelming the browser
    for (let i = 0; i < total; i += BATCH_SIZE) {
      const batch = files.slice(i, i + BATCH_SIZE);
      const promises = batch.map(async (file) => {
        try {
          const resized = await resizeImage(file);
          await savePhoto(db, resized);
        } catch (e) {
          console.warn('Skipped file:', file.name, e);
          failed++;
        }
        processed++;
        const pct = Math.round((processed / total) * 100);
        el.progressBar.style.width = pct + '%';
        el.progressText.textContent = `Processing ${processed} / ${total}`;
      });
      await Promise.all(promises);

      // let the UI breathe between batches
      await new Promise(r => setTimeout(r, 10));
    }

    // refresh key list and count
    photoIds = await getAllKeys(db);
    photoCount = photoIds.length;

    setTimeout(() => {
      el.progressWrap.classList.remove('active');
      el.progressBar.style.width = '0%';
      el.progressText.textContent = '';
    }, 500);

    updateUI();

    if (failed > 0) {
      console.warn(`Import done. ${failed} file(s) could not be processed.`);
    }
  }

  // ── Upload Events ──
  document.getElementById('pickFilesBtn').addEventListener('click', () => el.fileInput.click());
  document.getElementById('pickFolderBtn').addEventListener('click', () => el.folderInput.click());
  el.uploadZone.addEventListener('click', () => el.fileInput.click());

  el.fileInput.addEventListener('change', e => {
    if (e.target.files.length) handleFiles(e.target.files);
    e.target.value = ''; // reset so same selection works again
  });

  el.folderInput.addEventListener('change', e => {
    if (e.target.files.length) handleFiles(e.target.files);
    e.target.value = '';
  });

  el.clearBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (confirm('Remove all photos? This cannot be undone.')) {
      try {
        const db = await openDB();
        await clearAllPhotos(db);
      } catch(e) { console.warn('Clear failed', e); }
      photoIds = [];
      photoCount = 0;
      updateUI();
    }
  });

  // ── Settings Controls ──
  document.getElementById('intervalDown').addEventListener('click', () => {
    if (interval <= 5) interval = Math.max(3, interval - 1);
    else if (interval <= 15) interval -= 5;
    else interval = Math.max(15, interval - 15);
    el.intervalVal.textContent = interval + 's';
  });

  document.getElementById('intervalUp').addEventListener('click', () => {
    if (interval < 5) interval++;
    else if (interval < 15) interval += 5;
    else interval = Math.min(120, interval + 15);
    el.intervalVal.textContent = interval + 's';
  });

  // init display
  el.intervalVal.textContent = interval + 's';

  document.querySelectorAll('[data-transition]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-transition]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      transition = btn.dataset.transition;
    });
  });

  document.querySelectorAll('[data-order]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-order]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      order = btn.dataset.order;
    });
  });

  document.querySelectorAll('[data-fit]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-fit]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      fit = btn.dataset.fit;
    });
  });

  // ── Slideshow Engine ──
  // only loads current photo from DB on demand, preloads next
  let db = null; // keep connection open during slideshow

  function buildOrder() {
    shuffledOrder = Array.from({ length: photoIds.length }, (_, i) => i);
    if (order === 'shuffle') {
      for (let i = shuffledOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledOrder[i], shuffledOrder[j]] = [shuffledOrder[j], shuffledOrder[i]];
      }
    }
  }

  function revokeUrl(url) {
    if (url) {
      try { URL.revokeObjectURL(url); } catch(e) {}
    }
  }

  async function loadPhotoUrl(index) {
    const dbKey = photoIds[shuffledOrder[index]];
    const blob = await getPhoto(db, dbKey);
    if (!blob) return null;
    return URL.createObjectURL(blob);
  }

  async function showPhoto() {
    let url;

    // use preloaded if available for this index
    if (preloadedIndex === currentIndex && preloadedBlobUrl) {
      url = preloadedBlobUrl;
      preloadedBlobUrl = null;
      preloadedIndex = -1;
    } else {
      url = await loadPhotoUrl(currentIndex);
    }

    if (!url) return;

    // revoke old current
    const incoming = useSlideA ? el.slideA : el.slideB;
    const outgoing = useSlideA ? el.slideB : el.slideA;

    incoming.style.backgroundImage = `url('${url}')`;
    incoming.style.backgroundSize = (transition === 'kenburns' || fit === 'cover') ? 'cover' : 'contain';

    // ken burns: randomize direction
    incoming.classList.remove('ken-burns', 'kb-a', 'kb-b', 'kb-c');
    if (transition === 'kenburns') {
      incoming.classList.add('ken-burns');
      const variants = ['kb-a', 'kb-b', 'kb-c'];
      incoming.classList.add(variants[kbVariant % 3]);
      kbVariant++;
    }

    incoming.classList.add('visible');
    outgoing.classList.remove('visible');

    // after transition completes, revoke the outgoing URL
    const oldUrl = currentBlobUrl;
    setTimeout(() => revokeUrl(oldUrl), 2500);

    currentBlobUrl = url;
    useSlideA = !useSlideA;
    el.counter.textContent = `${currentIndex + 1} / ${photoIds.length}`;

    // preload next
    preloadNext();
  }

  async function preloadNext() {
    const nextIndex = (currentIndex + 1) % photoIds.length;
    // don't preload if already preloaded
    if (preloadedIndex === nextIndex && preloadedBlobUrl) return;

    revokeUrl(preloadedBlobUrl);
    preloadedBlobUrl = null;

    try {
      preloadedBlobUrl = await loadPhotoUrl(nextIndex);
      preloadedIndex = nextIndex;
    } catch(e) {
      // non-critical
    }
  }

  async function advance() {
    currentIndex = (currentIndex + 1) % photoIds.length;
    if (currentIndex === 0 && order === 'shuffle') buildOrder();
    await showPhoto();
  }

  async function startSlideshow() {
    db = await openDB();
    photoIds = await getAllKeys(db);
    if (!photoIds.length) return;

    buildOrder();
    currentIndex = 0;
    kbVariant = 0;

    el.slideA.classList.remove('visible', 'ken-burns', 'kb-a', 'kb-b', 'kb-c');
    el.slideB.classList.remove('visible', 'ken-burns', 'kb-a', 'kb-b', 'kb-c');
    el.slideA.style.backgroundImage = '';
    el.slideB.style.backgroundImage = '';

    el.setup.style.display = 'none';
    el.slideshow.classList.add('active');
    playing = true;

    document.documentElement.style.setProperty('--transition-speed', Math.min(interval * 0.3, 2) + 's');

    await showPhoto();
    timer = setInterval(() => advance(), interval * 1000);
    flashControls();
  }

  function stopSlideshow() {
    playing = false;
    clearInterval(timer);
    timer = null;

    // clean up blob URLs
    revokeUrl(currentBlobUrl);
    revokeUrl(preloadedBlobUrl);
    currentBlobUrl = null;
    preloadedBlobUrl = null;
    preloadedIndex = -1;

    el.slideA.style.backgroundImage = '';
    el.slideB.style.backgroundImage = '';
    el.slideshow.classList.remove('active', 'show-controls');
    el.setup.style.display = 'flex';
  }

  function flashControls() {
    el.slideshow.classList.add('show-controls');
    clearTimeout(controlsTimer);
    controlsTimer = setTimeout(() => {
      el.slideshow.classList.remove('show-controls');
    }, 3500);
  }

  el.startBtn.addEventListener('click', startSlideshow);
  el.exitBtn.addEventListener('click', stopSlideshow);

  el.pauseBtn.addEventListener('click', () => {
    if (playing) {
      clearInterval(timer);
      timer = null;
      playing = false;
      el.pauseBtn.textContent = '▶ Play';
    } else {
      playing = true;
      timer = setInterval(() => advance(), interval * 1000);
      el.pauseBtn.textContent = '❚❚ Pause';
    }
    flashControls();
  });

  el.slideshow.addEventListener('click', (e) => {
    if (e.target.closest('#slideshow-controls')) return;
    flashControls();
  });

  // ── Init: count saved photos ──
  (async () => {
    try {
      const d = await openDB();
      photoIds = await getAllKeys(d);
      photoCount = photoIds.length;
      updateUI();
    } catch(e) {
      console.warn('DB init failed', e);
    }
  })();

})();
</script>
</body>
</html>
