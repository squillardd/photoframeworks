<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Photo Frame">
<title>Photo Frame</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #151515;
    --surface-hover: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e4df;
    --text-dim: #7a756e;
    --accent: #c9a87c;
    --accent-dim: rgba(201, 168, 124, 0.15);
    --danger: #c25f5f;
    --danger-dim: rgba(194, 95, 95, 0.15);
    --transition-speed: 1.5s;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body { overflow: hidden; }

  /* ── SLIDESHOW ── */
  #slideshow {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none;
    cursor: none;
    z-index: 50;
  }

  #slideshow.active { display: block; }

  .slide {
    position: absolute; inset: 0;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity var(--transition-speed) ease-in-out;
    will-change: opacity;
  }

  .slide.visible { opacity: 1; }
  .slide.ken-burns { background-size: cover; }

  .slide.kb-a { animation: kenburns-a 20s ease-in-out forwards; }
  .slide.kb-b { animation: kenburns-b 20s ease-in-out forwards; }
  .slide.kb-c { animation: kenburns-c 20s ease-in-out forwards; }

  @keyframes kenburns-a {
    0%   { transform: scale(1.0) translate(0, 0); }
    100% { transform: scale(1.1) translate(-1.5%, -1%); }
  }
  @keyframes kenburns-b {
    0%   { transform: scale(1.05) translate(1%, 0); }
    100% { transform: scale(1.0) translate(-0.5%, 1%); }
  }
  @keyframes kenburns-c {
    0%   { transform: scale(1.0) translate(0.5%, 0.5%); }
    100% { transform: scale(1.08) translate(0%, -1.5%); }
  }

  #slideshow-controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 40px 30px calc(30px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 10;
  }

  #slideshow.show-controls #slideshow-controls { opacity: 1; }

  .ss-btn {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.2s;
  }

  .ss-btn:active { background: rgba(255,255,255,0.25); }

  #photo-counter {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* ── SETUP SCREEN ── */
  #setup {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  #setup::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(201,168,124,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,124,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  .setup-header {
    flex-shrink: 0;
    padding: 24px 24px 0;
    position: relative;
    z-index: 2;
  }

  .setup-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 24px 30px;
    position: relative;
    z-index: 1;
  }

  .setup-inner {
    max-width: 520px;
    margin: 0 auto;
    width: 100%;
  }

  .logo {
    text-align: center;
    margin-bottom: 28px;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }

  .logo-icon {
    width: 44px; height: 44px;
    margin: 0 auto 14px;
    border: 1.5px solid var(--border);
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
  }

  .logo-icon svg { width: 20px; height: 20px; stroke: var(--accent); fill: none; stroke-width: 1.5; }

  .logo h1 {
    font-size: 20px;
    font-weight: 400;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 300;
  }

  .upload-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .upload-btn {
    flex: 1;
    padding: 14px 16px;
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .upload-btn:active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .upload-btn svg {
    display: block;
    margin: 0 auto 6px;
    width: 20px; height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
  }

  /* ── THUMBNAIL GRID ── */
  .thumb-section {
    margin-bottom: 20px;
    display: none;
  }

  .thumb-section.has-photos { display: block; }

  .thumb-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 10px;
    flex-wrap: wrap;
  }

  .thumb-count {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 300;
  }

  .thumb-count strong {
    color: var(--accent);
    font-weight: 500;
  }

  .thumb-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .thumb-act-btn {
    padding: 6px 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
  }

  .thumb-act-btn:active { background: var(--surface-hover); }

  .thumb-act-btn.danger {
    background: var(--danger-dim);
    border-color: rgba(194, 95, 95, 0.3);
    color: var(--danger);
  }

  .thumb-act-btn.danger:active { background: rgba(194, 95, 95, 0.3); }

  .thumb-act-btn.hidden { display: none; }

  .thumb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 6px;
    max-height: 280px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 12px;
    padding: 2px;
  }

  .thumb-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
    border: 2px solid var(--border);
    transition: border-color 0.15s, opacity 0.2s;
    cursor: pointer;
  }

  .thumb-item.selected {
    border-color: var(--accent);
  }

  .thumb-check {
    position: absolute;
    top: 4px; left: 4px;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    transition: all 0.15s;
    pointer-events: none;
  }

  .thumb-check svg {
    width: 12px; height: 12px;
    stroke: #fff;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .thumb-item.selected .thumb-check {
    background: var(--accent);
    border-color: var(--accent);
  }

  .thumb-item.selected .thumb-check svg { opacity: 1; }

  .thumb-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .thumb-item img.loaded { opacity: 1; }

  .thumb-remove { display: none; /* replaced by selection workflow */ }

  /* Settings */
  .settings { margin-bottom: 24px; }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }

  .setting-row:last-child { border-bottom: none; }

  .setting-label {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
  }

  .setting-label small {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 300;
    margin-top: 2px;
  }

  .stepper {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .stepper button {
    width: 44px; height: 42px;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 300;
  }

  .stepper button:active { background: var(--surface-hover); }

  .stepper .stepper-val {
    min-width: 54px;
    text-align: center;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    line-height: 42px;
  }

  .toggle-wrap {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .toggle-opt {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }

  .toggle-opt.active {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .toggle-opt + .toggle-opt { border-left: 1px solid var(--border); }

  .start-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--accent);
    color: var(--bg);
  }

  .start-btn:disabled {
    background: var(--surface);
    color: var(--text-dim);
    cursor: not-allowed;
    border: 1px solid var(--border);
  }

  .start-btn:not(:disabled):active {
    transform: scale(0.98);
    filter: brightness(0.9);
  }

  .progress-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.05);
    z-index: 100;
    display: none;
  }

  .progress-wrap.active { display: block; }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.15s ease-out;
  }

  .progress-text {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 300;
    z-index: 101;
    display: none;
    background: var(--surface);
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .progress-wrap.active ~ .progress-text { display: block; }
</style>
</head>
<body>

<div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="progress-text" id="progressText"></div>

<div id="setup">
  <div class="setup-header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </div>
      <h1>Photo Frame</h1>
      <p>No accounts. No subscriptions. Just your photos.</p>
    </div>
  </div>

  <div class="setup-scroll">
    <div class="setup-inner">

      <div class="upload-row">
        <button class="upload-btn" id="pickFilesBtn">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Select Photos
        </button>
        <button class="upload-btn" id="pickFolderBtn">
          <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          Select Folder
        </button>
      </div>

      <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
      <input type="file" id="folderInput" webkitdirectory multiple accept="image/*" style="display:none">

      <div class="thumb-section" id="thumbSection">
        <div class="thumb-header">
          <span class="thumb-count"><strong id="thumbCount">0</strong> photos</span>
          <div class="thumb-actions">
            <button class="thumb-act-btn" id="selectAllBtn">Select All</button>
            <button class="thumb-act-btn hidden" id="deselectAllBtn">Deselect</button>
            <button class="thumb-act-btn danger hidden" id="removeSelectedBtn">Remove Selected</button>
            <button class="thumb-act-btn danger" id="clearAllBtn">Clear All</button>
          </div>
        </div>
        <div class="thumb-grid" id="thumbGrid"></div>
      </div>

      <div class="settings">
        <div class="setting-row">
          <div class="setting-label">
            Interval
            <small>seconds per photo</small>
          </div>
          <div class="stepper">
            <button id="intervalDown">−</button>
            <div class="stepper-val" id="intervalVal">10s</div>
            <button id="intervalUp">+</button>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">Transition</div>
          <div class="toggle-wrap">
            <button class="toggle-opt active" data-transition="fade">Fade</button>
            <button class="toggle-opt" data-transition="kenburns">Ken Burns</button>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">Order</div>
          <div class="toggle-wrap">
            <button class="toggle-opt active" data-order="shuffle">Shuffle</button>
            <button class="toggle-opt" data-order="sequential">In Order</button>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">
            Fit
            <small>contain = full photo</small>
          </div>
          <div class="toggle-wrap">
            <button class="toggle-opt active" data-fit="contain">Contain</button>
            <button class="toggle-opt" data-fit="cover">Fill</button>
          </div>
        </div>
      </div>

      <button class="start-btn" id="startBtn" disabled>Start Slideshow</button>
    </div>
  </div>
</div>

<div id="slideshow">
  <div class="slide" id="slideA"></div>
  <div class="slide" id="slideB"></div>
  <div id="slideshow-controls">
    <button class="ss-btn" id="exitBtn">✕ Exit</button>
    <span id="photo-counter"></span>
    <button class="ss-btn" id="pauseBtn">❚❚ Pause</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  const MAX_DIM = 1920;
  const THUMB_DIM = 150;
  const JPEG_Q = 0.82;
  const THUMB_Q = 0.6;
  const DB_NAME = 'PhotoFrameDB';
  const DB_VER = 3;
  const P_STORE = 'photos';
  const T_STORE = 'thumbnails';
  const BATCH = 5;

  let photoIds = [];
  let interval = 10;
  let transition = 'fade';
  let order = 'shuffle';
  let fit = 'contain';
  let currentIndex = 0;
  let shuffledOrder = [];
  let playing = false;
  let timer = null;
  let controlsTimer = null;
  let useSlideA = true;
  let kbVariant = 0;
  let currentBlobUrl = null;
  let preloadedBlobUrl = null;
  let preloadedIndex = -1;
  let thumbBlobUrls = [];
  let selectedIds = new Set();

  // ── DB ──
  function openDB() {
    return new Promise((res, rej) => {
      const r = indexedDB.open(DB_NAME, DB_VER);
      r.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(P_STORE))
          db.createObjectStore(P_STORE, { keyPath: 'id', autoIncrement: true });
        if (!db.objectStoreNames.contains(T_STORE))
          db.createObjectStore(T_STORE, { keyPath: 'id' });
      };
      r.onsuccess = e => res(e.target.result);
      r.onerror = e => rej(e.target.error);
    });
  }

  function dbSavePhotoAndThumb(db, pBlob, tBlob) {
    return new Promise((res, rej) => {
      const tx = db.transaction([P_STORE, T_STORE], 'readwrite');
      const pr = tx.objectStore(P_STORE).add({ blob: pBlob });
      pr.onsuccess = () => tx.objectStore(T_STORE).put({ id: pr.result, blob: tBlob });
      tx.oncomplete = () => res(pr.result);
      tx.onerror = () => rej(tx.error);
    });
  }

  function dbGetAllKeys(db) {
    return new Promise((res, rej) => {
      const r = db.transaction(P_STORE, 'readonly').objectStore(P_STORE).getAllKeys();
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  }

  function dbGetPhoto(db, id) {
    return new Promise((res, rej) => {
      const r = db.transaction(P_STORE, 'readonly').objectStore(P_STORE).get(id);
      r.onsuccess = () => res(r.result ? r.result.blob : null);
      r.onerror = () => rej(r.error);
    });
  }

  function dbGetThumb(db, id) {
    return new Promise((res, rej) => {
      const r = db.transaction(T_STORE, 'readonly').objectStore(T_STORE).get(id);
      r.onsuccess = () => res(r.result ? r.result.blob : null);
      r.onerror = () => rej(r.error);
    });
  }

  function dbDeletePhoto(db, id) {
    return new Promise((res, rej) => {
      const tx = db.transaction([P_STORE, T_STORE], 'readwrite');
      tx.objectStore(P_STORE).delete(id);
      tx.objectStore(T_STORE).delete(id);
      tx.oncomplete = res;
      tx.onerror = () => rej(tx.error);
    });
  }

  function dbClearAll(db) {
    return new Promise((res, rej) => {
      const tx = db.transaction([P_STORE, T_STORE], 'readwrite');
      tx.objectStore(P_STORE).clear();
      tx.objectStore(T_STORE).clear();
      tx.oncomplete = res;
      tx.onerror = () => rej(tx.error);
    });
  }

  // ── Image Processing ──
  function resizeToBlob(file, maxDim, quality) {
    return new Promise((res, rej) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        let { width: w, height: h } = img;
        const s = Math.max(w, h) > maxDim ? maxDim / Math.max(w, h) : 1;
        const nw = Math.round(w * s), nh = Math.round(h * s);
        const c = document.createElement('canvas');
        c.width = nw; c.height = nh;
        c.getContext('2d').drawImage(img, 0, 0, nw, nh);
        c.toBlob(b => b ? res(b) : rej(new Error('toBlob fail')), 'image/jpeg', quality);
      };
      img.onerror = () => { URL.revokeObjectURL(url); rej(new Error('load fail')); };
      img.src = url;
    });
  }

  async function processFile(file) {
    const [photo, thumb] = await Promise.all([
      resizeToBlob(file, MAX_DIM, JPEG_Q),
      resizeToBlob(file, THUMB_DIM, THUMB_Q),
    ]);
    return { photo, thumb };
  }

  // ── Elements ──
  const el = {
    setup: document.getElementById('setup'),
    slideshow: document.getElementById('slideshow'),
    fileInput: document.getElementById('fileInput'),
    folderInput: document.getElementById('folderInput'),
    thumbSection: document.getElementById('thumbSection'),
    thumbCount: document.getElementById('thumbCount'),
    thumbGrid: document.getElementById('thumbGrid'),
    intervalVal: document.getElementById('intervalVal'),
    startBtn: document.getElementById('startBtn'),
    exitBtn: document.getElementById('exitBtn'),
    pauseBtn: document.getElementById('pauseBtn'),
    counter: document.getElementById('photo-counter'),
    slideA: document.getElementById('slideA'),
    slideB: document.getElementById('slideB'),
    progressWrap: document.getElementById('progressWrap'),
    progressBar: document.getElementById('progressBar'),
    progressText: document.getElementById('progressText'),
  };

  // ── Thumbnail Grid ──
  let thumbObserver = null;

  function revokeThumbUrls() {
    thumbBlobUrls.forEach(u => { try { URL.revokeObjectURL(u); } catch(e){} });
    thumbBlobUrls = [];
  }

  async function buildThumbGrid() {
    revokeThumbUrls();
    el.thumbGrid.innerHTML = '';
    selectedIds.clear();
    updateSelectionUI();

    const has = photoIds.length > 0;
    el.thumbSection.classList.toggle('has-photos', has);
    el.thumbCount.textContent = photoIds.length;
    el.startBtn.disabled = !has;
    if (!has) return;

    if (thumbObserver) thumbObserver.disconnect();

    const frag = document.createDocumentFragment();
    photoIds.forEach(id => {
      const item = document.createElement('div');
      item.className = 'thumb-item';
      item.dataset.pid = id;

      const check = document.createElement('div');
      check.className = 'thumb-check';
      check.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';

      const img = document.createElement('img');
      img.alt = '';
      img.dataset.pid = id;

      item.appendChild(check);
      item.appendChild(img);
      frag.appendChild(item);
    });
    el.thumbGrid.appendChild(frag);

    // lazy-load thumbs as they scroll into view
    const db = await openDB();
    thumbObserver = new IntersectionObserver((entries) => {
      entries.forEach(async (entry) => {
        if (!entry.isIntersecting) return;
        const img = entry.target;
        if (img.src) return;
        const id = parseInt(img.dataset.pid);
        try {
          const blob = await dbGetThumb(db, id);
          if (blob) {
            const url = URL.createObjectURL(blob);
            thumbBlobUrls.push(url);
            img.src = url;
            img.onload = () => img.classList.add('loaded');
          }
        } catch(e) {}
        thumbObserver.unobserve(img);
      });
    }, { root: el.thumbGrid, rootMargin: '200px' });

    el.thumbGrid.querySelectorAll('img').forEach(img => thumbObserver.observe(img));
  }

  // ── Selection UI ──
  function updateSelectionUI() {
    const count = selectedIds.size;
    const hasSelection = count > 0;
    const allSelected = count === photoIds.length && count > 0;

    document.getElementById('selectAllBtn').classList.toggle('hidden', allSelected);
    document.getElementById('deselectAllBtn').classList.toggle('hidden', !hasSelection);
    document.getElementById('removeSelectedBtn').classList.toggle('hidden', !hasSelection);
    document.getElementById('removeSelectedBtn').textContent = hasSelection
      ? `Remove ${count} Selected` : 'Remove Selected';
  }

  // tap thumbnail to toggle selection
  el.thumbGrid.addEventListener('click', (e) => {
    const item = e.target.closest('.thumb-item');
    if (!item) return;
    const id = parseInt(item.dataset.pid);
    if (selectedIds.has(id)) {
      selectedIds.delete(id);
      item.classList.remove('selected');
    } else {
      selectedIds.add(id);
      item.classList.add('selected');
    }
    updateSelectionUI();
  });

  // select all
  document.getElementById('selectAllBtn').addEventListener('click', () => {
    photoIds.forEach(id => selectedIds.add(id));
    el.thumbGrid.querySelectorAll('.thumb-item').forEach(el => el.classList.add('selected'));
    updateSelectionUI();
  });

  // deselect all
  document.getElementById('deselectAllBtn').addEventListener('click', () => {
    selectedIds.clear();
    el.thumbGrid.querySelectorAll('.thumb-item').forEach(el => el.classList.remove('selected'));
    updateSelectionUI();
  });

  // remove selected
  document.getElementById('removeSelectedBtn').addEventListener('click', async () => {
    const count = selectedIds.size;
    if (!count) return;
    if (!confirm(`Remove ${count} selected photo${count > 1 ? 's' : ''}?`)) return;

    const toDelete = Array.from(selectedIds);
    // visual feedback — fade them out
    el.thumbGrid.querySelectorAll('.thumb-item.selected').forEach(el => {
      el.style.opacity = '0.2';
      el.style.pointerEvents = 'none';
    });

    try {
      const db = await openDB();
      for (const id of toDelete) {
        await dbDeletePhoto(db, id);
      }
      photoIds = photoIds.filter(k => !selectedIds.has(k));
      selectedIds.clear();
    } catch(e) { console.warn('Batch delete failed', e); }

    buildThumbGrid();
  });

  // clear all
  document.getElementById('clearAllBtn').addEventListener('click', async () => {
    if (!confirm('Remove all ' + photoIds.length + ' photos?')) return;
    try { await dbClearAll(await openDB()); } catch(e) {}
    photoIds = [];
    selectedIds.clear();
    revokeThumbUrls();
    buildThumbGrid();
  });

  // ── Import ──
  async function handleFiles(fileList) {
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if (!files.length) return;
    const total = files.length;
    let done = 0, fail = 0;

    el.progressWrap.classList.add('active');
    el.progressBar.style.width = '0%';
    el.progressText.textContent = `0 / ${total}`;

    const db = await openDB();
    for (let i = 0; i < total; i += BATCH) {
      const batch = files.slice(i, i + BATCH);
      await Promise.all(batch.map(async (f) => {
        try {
          const { photo, thumb } = await processFile(f);
          await dbSavePhotoAndThumb(db, photo, thumb);
        } catch(e) { fail++; }
        done++;
        el.progressBar.style.width = Math.round((done / total) * 100) + '%';
        el.progressText.textContent = `${done} / ${total}`;
      }));
      await new Promise(r => setTimeout(r, 10));
    }

    photoIds = await dbGetAllKeys(db);
    setTimeout(() => {
      el.progressWrap.classList.remove('active');
      el.progressBar.style.width = '0%';
      el.progressText.textContent = '';
    }, 600);
    buildThumbGrid();
    if (fail) console.warn(`${fail} file(s) skipped.`);
  }

  // ── Upload Events ──
  document.getElementById('pickFilesBtn').addEventListener('click', () => el.fileInput.click());
  document.getElementById('pickFolderBtn').addEventListener('click', () => el.folderInput.click());
  el.fileInput.addEventListener('change', e => { if (e.target.files.length) handleFiles(e.target.files); e.target.value = ''; });
  el.folderInput.addEventListener('change', e => { if (e.target.files.length) handleFiles(e.target.files); e.target.value = ''; });

  // ── Settings ──
  document.getElementById('intervalDown').addEventListener('click', () => {
    if (interval <= 5) interval = Math.max(3, interval - 1);
    else if (interval <= 15) interval -= 5;
    else interval = Math.max(15, interval - 15);
    el.intervalVal.textContent = interval + 's';
  });
  document.getElementById('intervalUp').addEventListener('click', () => {
    if (interval < 5) interval++;
    else if (interval < 15) interval += 5;
    else interval = Math.min(120, interval + 15);
    el.intervalVal.textContent = interval + 's';
  });
  el.intervalVal.textContent = interval + 's';

  document.querySelectorAll('[data-transition]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-transition]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      transition = btn.dataset.transition;
    });
  });
  document.querySelectorAll('[data-order]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-order]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      order = btn.dataset.order;
    });
  });
  document.querySelectorAll('[data-fit]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-fit]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      fit = btn.dataset.fit;
    });
  });

  // ── Slideshow Engine ──
  let ssDb = null;

  function buildOrder() {
    shuffledOrder = Array.from({ length: photoIds.length }, (_, i) => i);
    if (order === 'shuffle') {
      for (let i = shuffledOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledOrder[i], shuffledOrder[j]] = [shuffledOrder[j], shuffledOrder[i]];
      }
    }
  }

  function revokeUrl(u) { if (u) try { URL.revokeObjectURL(u); } catch(e){} }

  async function loadPhotoUrl(idx) {
    const blob = await dbGetPhoto(ssDb, photoIds[shuffledOrder[idx]]);
    return blob ? URL.createObjectURL(blob) : null;
  }

  async function showPhoto() {
    let url;
    if (preloadedIndex === currentIndex && preloadedBlobUrl) {
      url = preloadedBlobUrl; preloadedBlobUrl = null; preloadedIndex = -1;
    } else {
      url = await loadPhotoUrl(currentIndex);
    }
    if (!url) return;

    const inc = useSlideA ? el.slideA : el.slideB;
    const out = useSlideA ? el.slideB : el.slideA;

    inc.style.backgroundImage = `url('${url}')`;
    inc.style.backgroundSize = (transition === 'kenburns' || fit === 'cover') ? 'cover' : 'contain';

    inc.classList.remove('ken-burns', 'kb-a', 'kb-b', 'kb-c');
    if (transition === 'kenburns') {
      inc.classList.add('ken-burns', ['kb-a','kb-b','kb-c'][kbVariant++ % 3]);
    }

    inc.classList.add('visible');
    out.classList.remove('visible');

    const old = currentBlobUrl;
    setTimeout(() => revokeUrl(old), 2500);
    currentBlobUrl = url;
    useSlideA = !useSlideA;
    el.counter.textContent = `${currentIndex + 1} / ${photoIds.length}`;
    preloadNext();
  }

  async function preloadNext() {
    const ni = (currentIndex + 1) % photoIds.length;
    if (preloadedIndex === ni && preloadedBlobUrl) return;
    revokeUrl(preloadedBlobUrl); preloadedBlobUrl = null;
    try { preloadedBlobUrl = await loadPhotoUrl(ni); preloadedIndex = ni; } catch(e) {}
  }

  async function advance() {
    currentIndex = (currentIndex + 1) % photoIds.length;
    if (currentIndex === 0 && order === 'shuffle') buildOrder();
    await showPhoto();
  }

  async function startSlideshow() {
    ssDb = await openDB();
    photoIds = await dbGetAllKeys(ssDb);
    if (!photoIds.length) return;

    revokeThumbUrls();
    if (thumbObserver) thumbObserver.disconnect();

    buildOrder();
    currentIndex = 0; kbVariant = 0;

    el.slideA.classList.remove('visible','ken-burns','kb-a','kb-b','kb-c');
    el.slideB.classList.remove('visible','ken-burns','kb-a','kb-b','kb-c');
    el.slideA.style.backgroundImage = '';
    el.slideB.style.backgroundImage = '';

    el.setup.style.display = 'none';
    el.slideshow.classList.add('active');
    playing = true;

    document.documentElement.style.setProperty('--transition-speed', Math.min(interval * 0.3, 2) + 's');
    await showPhoto();
    timer = setInterval(() => advance(), interval * 1000);
    flashControls();
  }

  function stopSlideshow() {
    playing = false;
    clearInterval(timer); timer = null;
    revokeUrl(currentBlobUrl); revokeUrl(preloadedBlobUrl);
    currentBlobUrl = null; preloadedBlobUrl = null; preloadedIndex = -1;
    el.slideA.style.backgroundImage = '';
    el.slideB.style.backgroundImage = '';
    el.slideshow.classList.remove('active', 'show-controls');
    el.setup.style.display = 'flex';
    buildThumbGrid();
  }

  function flashControls() {
    el.slideshow.classList.add('show-controls');
    clearTimeout(controlsTimer);
    controlsTimer = setTimeout(() => el.slideshow.classList.remove('show-controls'), 3500);
  }

  el.startBtn.addEventListener('click', startSlideshow);
  el.exitBtn.addEventListener('click', stopSlideshow);
  el.pauseBtn.addEventListener('click', () => {
    if (playing) {
      clearInterval(timer); timer = null; playing = false;
      el.pauseBtn.textContent = '▶ Play';
    } else {
      playing = true;
      timer = setInterval(() => advance(), interval * 1000);
      el.pauseBtn.textContent = '❚❚ Pause';
    }
    flashControls();
  });
  el.slideshow.addEventListener('click', (e) => {
    if (e.target.closest('#slideshow-controls')) return;
    flashControls();
  });

  // ── Init ──
  (async () => {
    try {
      const db = await openDB();
      photoIds = await dbGetAllKeys(db);
      buildThumbGrid();
    } catch(e) { console.warn('DB init failed', e); }
  })();

})();
</script>
</body>
</html>
