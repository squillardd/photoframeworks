<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Photo Frame">
<title>Photo Frame</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #151515;
    --surface-hover: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e4df;
    --text-dim: #7a756e;
    --accent: #c9a87c;
    --accent-dim: rgba(201, 168, 124, 0.15);
    --transition-speed: 1.5s;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── SLIDESHOW ── */
  #slideshow {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none;
    cursor: none;
  }

  #slideshow.active { display: block; }

  .slide {
    position: absolute; inset: 0;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity var(--transition-speed) ease-in-out;
    will-change: opacity;
  }

  .slide.visible { opacity: 1; }

  .slide.ken-burns {
    background-size: cover;
    animation: kenburns 25s ease-in-out infinite alternate;
  }

  @keyframes kenburns {
    0%   { transform: scale(1.0) translate(0, 0); }
    100% { transform: scale(1.08) translate(-1%, -0.5%); }
  }

  #slideshow-controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 40px 30px 30px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 10;
  }

  #slideshow.show-controls #slideshow-controls { opacity: 1; }

  .ss-btn {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.2s;
  }

  .ss-btn:active { background: rgba(255,255,255,0.25); }

  #photo-counter {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* ── SETUP SCREEN ── */
  #setup {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
    position: relative;
    overflow-y: auto;
  }

  #setup::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(201,168,124,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,124,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  .setup-card {
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
  }

  .logo {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo-icon {
    width: 48px; height: 48px;
    margin: 0 auto 18px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
  }

  .logo-icon svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.5; }

  .logo h1 {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo p {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
    font-weight: 300;
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 16px;
    padding: 44px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.3s, background 0.3s;
    background: transparent;
    margin-bottom: 28px;
  }

  .upload-zone:active,
  .upload-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .upload-zone.has-photos {
    border-style: solid;
    border-color: var(--accent);
    background: var(--accent-dim);
    padding: 28px 24px;
  }

  .upload-icon {
    width: 40px; height: 40px;
    margin: 0 auto 14px;
    opacity: 0.4;
  }

  .upload-icon svg { width: 100%; height: 100%; stroke: var(--text); fill: none; stroke-width: 1.2; }

  .upload-zone p {
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 300;
  }

  .upload-zone .photo-count {
    font-size: 28px;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .upload-zone .photo-label {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 300;
  }

  .upload-zone .tap-hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 14px;
    opacity: 0.6;
  }

  /* Settings */
  .settings { margin-bottom: 32px; }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .setting-row:last-child { border-bottom: none; }

  .setting-label {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
  }

  .setting-label small {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 300;
    margin-top: 3px;
  }

  /* Stepper */
  .stepper {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .stepper button {
    width: 40px; height: 38px;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 300;
    transition: background 0.15s;
  }

  .stepper button:active { background: var(--surface-hover); }

  .stepper .stepper-val {
    min-width: 50px;
    text-align: center;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 0 4px;
    line-height: 38px;
  }

  /* Toggle */
  .toggle-wrap {
    display: flex; gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .toggle-opt {
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }

  .toggle-opt.active {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .toggle-opt + .toggle-opt { border-left: 1px solid var(--border); }

  /* Start button */
  .start-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--accent);
    color: var(--bg);
  }

  .start-btn:disabled {
    background: var(--surface);
    color: var(--text-dim);
    cursor: not-allowed;
    border: 1px solid var(--border);
  }

  .start-btn:not(:disabled):active {
    transform: scale(0.98);
    filter: brightness(0.9);
  }

  .clear-link {
    display: block;
    text-align: center;
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    opacity: 0.6;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }

  /* Loading */
  .loading-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.3s;
    z-index: 100;
    display: none;
  }

  .loading-bar.active { display: block; }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<!-- SETUP SCREEN -->
<div id="setup">
  <div class="setup-card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </div>
      <h1>Photo Frame</h1>
      <p>No accounts. No subscriptions. Just your photos.</p>
    </div>

    <div class="upload-zone" id="uploadZone">
      <div id="uploadEmpty">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        </div>
        <p>Tap to select photos</p>
      </div>
      <div id="uploadLoaded" style="display:none">
        <div class="photo-count" id="photoCount">0</div>
        <div class="photo-label">photos loaded</div>
        <div class="tap-hint">tap to add more</div>
      </div>
    </div>

    <input type="file" id="fileInput" multiple accept="image/*" style="display:none">

    <div class="settings">
      <div class="setting-row">
        <div class="setting-label">
          Interval
          <small>seconds per photo</small>
        </div>
        <div class="stepper">
          <button id="intervalDown">−</button>
          <div class="stepper-val" id="intervalVal">10</div>
          <button id="intervalUp">+</button>
        </div>
      </div>

      <div class="setting-row">
        <div class="setting-label">
          Transition
        </div>
        <div class="toggle-wrap">
          <button class="toggle-opt active" data-transition="fade">Fade</button>
          <button class="toggle-opt" data-transition="kenburns">Ken Burns</button>
        </div>
      </div>

      <div class="setting-row">
        <div class="setting-label">
          Order
        </div>
        <div class="toggle-wrap">
          <button class="toggle-opt active" data-order="shuffle">Shuffle</button>
          <button class="toggle-opt" data-order="sequential">In Order</button>
        </div>
      </div>

      <div class="setting-row">
        <div class="setting-label">
          Fit
          <small>contain shows full photo</small>
        </div>
        <div class="toggle-wrap">
          <button class="toggle-opt active" data-fit="contain">Contain</button>
          <button class="toggle-opt" data-fit="cover">Fill</button>
        </div>
      </div>
    </div>

    <button class="start-btn" id="startBtn" disabled>Start Slideshow</button>
    <button class="clear-link" id="clearBtn" style="display:none">Clear all photos</button>
  </div>
</div>

<!-- SLIDESHOW -->
<div id="slideshow">
  <div class="slide" id="slideA"></div>
  <div class="slide" id="slideB"></div>
  <div id="slideshow-controls">
    <button class="ss-btn" id="exitBtn">✕ Exit</button>
    <span id="photo-counter"></span>
    <button class="ss-btn" id="pauseBtn">❚❚ Pause</button>
  </div>
</div>

<script>
(function() {
  // ── State ──
  let photos = [];        // array of blob URLs
  let photoBlobs = [];    // raw blobs for DB storage
  let interval = 10;
  let transition = 'fade';
  let order = 'shuffle';
  let fit = 'contain';
  let currentIndex = 0;
  let shuffledOrder = [];
  let playing = false;
  let timer = null;
  let controlsTimer = null;
  let useSlideA = true;

  // ── DB ──
  const DB_NAME = 'PhotoFrameDB';
  const DB_VERSION = 1;
  const STORE = 'photos';

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE)) {
          db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        }
      };
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = e => reject(e.target.error);
    });
  }

  async function savePhotos(blobs) {
    const db = await openDB();
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    for (const blob of blobs) {
      store.add({ blob });
    }
    return new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  }

  async function loadPhotos() {
    const db = await openDB();
    const tx = db.transaction(STORE, 'readonly');
    const store = tx.objectStore(STORE);
    const req = store.getAll();
    return new Promise((resolve, reject) => {
      req.onsuccess = () => resolve(req.result.map(r => r.blob));
      req.onerror = () => reject(req.error);
    });
  }

  async function clearPhotos() {
    const db = await openDB();
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).clear();
    return new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  }

  // ── Elements ──
  const el = {
    setup: document.getElementById('setup'),
    slideshow: document.getElementById('slideshow'),
    uploadZone: document.getElementById('uploadZone'),
    uploadEmpty: document.getElementById('uploadEmpty'),
    uploadLoaded: document.getElementById('uploadLoaded'),
    fileInput: document.getElementById('fileInput'),
    photoCount: document.getElementById('photoCount'),
    intervalVal: document.getElementById('intervalVal'),
    startBtn: document.getElementById('startBtn'),
    clearBtn: document.getElementById('clearBtn'),
    exitBtn: document.getElementById('exitBtn'),
    pauseBtn: document.getElementById('pauseBtn'),
    counter: document.getElementById('photo-counter'),
    slideA: document.getElementById('slideA'),
    slideB: document.getElementById('slideB'),
    loadingBar: document.getElementById('loadingBar'),
  };

  // ── Upload ──
  function updateUI() {
    const has = photos.length > 0;
    el.uploadEmpty.style.display = has ? 'none' : 'block';
    el.uploadLoaded.style.display = has ? 'block' : 'none';
    el.photoCount.textContent = photos.length;
    el.startBtn.disabled = !has;
    el.clearBtn.style.display = has ? 'block' : 'none';
    if (has) el.uploadZone.classList.add('has-photos');
    else el.uploadZone.classList.remove('has-photos');
  }

  async function handleFiles(fileList) {
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if (!files.length) return;

    el.loadingBar.classList.add('active');
    const newBlobs = [];

    for (let i = 0; i < files.length; i++) {
      el.loadingBar.style.transform = `scaleX(${(i + 1) / files.length})`;
      const blob = files[i];
      newBlobs.push(blob);
      const url = URL.createObjectURL(blob);
      photos.push(url);
      photoBlobs.push(blob);
    }

    try { await savePhotos(newBlobs); } catch(e) { console.warn('DB save failed', e); }

    setTimeout(() => {
      el.loadingBar.classList.remove('active');
      el.loadingBar.style.transform = 'scaleX(0)';
    }, 400);

    updateUI();
  }

  el.uploadZone.addEventListener('click', () => el.fileInput.click());
  el.fileInput.addEventListener('change', e => handleFiles(e.target.files));

  el.clearBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (confirm('Remove all photos?')) {
      photos.forEach(u => URL.revokeObjectURL(u));
      photos = [];
      photoBlobs = [];
      try { await clearPhotos(); } catch(e) {}
      updateUI();
    }
  });

  // ── Settings Controls ──
  document.getElementById('intervalDown').addEventListener('click', () => {
    interval = Math.max(3, interval - (interval <= 10 ? 1 : 5));
    el.intervalVal.textContent = interval;
  });

  document.getElementById('intervalUp').addEventListener('click', () => {
    interval = Math.min(120, interval + (interval < 10 ? 1 : 5));
    el.intervalVal.textContent = interval;
  });

  document.querySelectorAll('[data-transition]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-transition]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      transition = btn.dataset.transition;
    });
  });

  document.querySelectorAll('[data-order]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-order]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      order = btn.dataset.order;
    });
  });

  document.querySelectorAll('[data-fit]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-fit]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      fit = btn.dataset.fit;
    });
  });

  // ── Slideshow ──
  function buildOrder() {
    shuffledOrder = Array.from({ length: photos.length }, (_, i) => i);
    if (order === 'shuffle') {
      for (let i = shuffledOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledOrder[i], shuffledOrder[j]] = [shuffledOrder[j], shuffledOrder[i]];
      }
    }
  }

  function showPhoto() {
    const idx = shuffledOrder[currentIndex];
    const url = photos[idx];
    const bgSize = fit === 'cover' ? 'cover' : 'contain';
    const incoming = useSlideA ? el.slideA : el.slideB;
    const outgoing = useSlideA ? el.slideB : el.slideA;

    incoming.style.backgroundImage = `url('${url}')`;
    incoming.style.backgroundSize = bgSize;

    if (transition === 'kenburns') {
      incoming.classList.add('ken-burns');
      incoming.style.backgroundSize = 'cover';
    } else {
      incoming.classList.remove('ken-burns');
    }

    incoming.classList.add('visible');
    outgoing.classList.remove('visible');

    useSlideA = !useSlideA;
    el.counter.textContent = `${currentIndex + 1} / ${photos.length}`;
  }

  function advance() {
    currentIndex = (currentIndex + 1) % photos.length;
    if (currentIndex === 0 && order === 'shuffle') buildOrder();
    showPhoto();
  }

  function startSlideshow() {
    buildOrder();
    currentIndex = 0;

    el.slideA.classList.remove('visible', 'ken-burns');
    el.slideB.classList.remove('visible', 'ken-burns');

    el.setup.style.display = 'none';
    el.slideshow.classList.add('active');
    playing = true;

    // Set CSS transition speed
    document.documentElement.style.setProperty('--transition-speed', Math.min(interval * 0.3, 2) + 's');

    showPhoto();
    timer = setInterval(advance, interval * 1000);

    // Show controls briefly
    flashControls();
  }

  function stopSlideshow() {
    playing = false;
    clearInterval(timer);
    el.slideshow.classList.remove('active', 'show-controls');
    el.setup.style.display = 'flex';
  }

  function flashControls() {
    el.slideshow.classList.add('show-controls');
    clearTimeout(controlsTimer);
    controlsTimer = setTimeout(() => {
      el.slideshow.classList.remove('show-controls');
    }, 3000);
  }

  el.startBtn.addEventListener('click', startSlideshow);
  el.exitBtn.addEventListener('click', stopSlideshow);

  el.pauseBtn.addEventListener('click', () => {
    if (playing) {
      clearInterval(timer);
      playing = false;
      el.pauseBtn.textContent = '▶ Play';
    } else {
      playing = true;
      timer = setInterval(advance, interval * 1000);
      el.pauseBtn.textContent = '❚❚ Pause';
    }
    flashControls();
  });

  el.slideshow.addEventListener('click', (e) => {
    if (e.target.closest('#slideshow-controls')) return;
    flashControls();
  });

  // ── Init: load saved photos ──
  (async () => {
    try {
      const saved = await loadPhotos();
      if (saved.length) {
        for (const blob of saved) {
          const url = URL.createObjectURL(blob);
          photos.push(url);
          photoBlobs.push(blob);
        }
        updateUI();
      }
    } catch(e) {
      console.warn('Could not load saved photos', e);
    }
  })();
})();
</script>
</body>
</html>
